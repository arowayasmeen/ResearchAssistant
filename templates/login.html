{% extends "base.html" %}

{% block content %}
<section class="fade-up">
    <h1 class="text-4xl font-bold mb-6">Log In</h1>
    
    <div class="glass-card max-w-md mx-auto p-6 rounded-lg">
        <form method="POST" action="{{ url_for('login') }}" class="text-left">
            <div class="mb-4">
                <label for="email" class="block mb-2 font-medium">Email Address</label>
                <input type="email" 
                       id="email" 
                       name="email" 
                       placeholder="Enter your email address"
                       class="w-full p-3 rounded border bg-white/60" 
                       required>
            </div>
            
            <div class="mb-6">
                <label for="password" class="block mb-2 font-medium">Password</label>
                <input type="password" 
                       id="password" 
                       name="password" 
                       placeholder="Enter your password"
                       class="w-full p-3 rounded border bg-white/60" 
                       required>
                <div class="flex justify-between mt-1">
                    <div class="flex items-center">
                        <input type="checkbox" id="remember" name="remember" class="mr-2">
                        <label for="remember" class="text-sm text-gray-500">Remember me</label>
                    </div>
                    <a href="#" class="text-sm text-blue-600 hover:underline">Forgot password?</a>
                </div>
            </div>
            
            <div class="flex justify-center">
                <button type="submit" class="px-8 py-3 bg-blue-600 text-white rounded-md hover:bg-blue-700 transition-colors">
                    Log In
                </button>
            </div>
            
            <div class="mt-4 text-center">
                <p class="text-sm">Don't have an account? <a href="{{ url_for('signup') }}" class="text-blue-600 hover:underline">Sign Up</a></p>
            </div>
        </form>
    </div>
</section>
{% endblock %}
